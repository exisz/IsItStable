name: Sync Version Data
on:
  schedule:
    - cron: '30 0 * * *'  # daily at 00:30 UTC
  workflow_dispatch: {}

concurrency:
  group: sync-data
  cancel-in-progress: true

permissions:
  contents: write
  issues: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g tsx
      - run: tsx scripts/sync.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || (git commit -m "data: sync version data" && git pull --rebase && git push)
      - name: Trigger Vercel deploy
        if: success()
        run: curl -s -X POST "https://api.vercel.com/v1/integrations/deploy/prj_NYYwxdJ6116rTGaq3c9zvw8ilQBK/MWzGRatstL" > /dev/null
